AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  python.aws-lambda.crew-ai

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 60
    # You can add LoggingConfig parameters such as the Logformat, Log Group, and SystemLogLevel or ApplicationLogLevel. Learn more here https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-function.html#sam-function-loggingconfig.
    LoggingConfig:
      LogFormat: JSON

Parameters:
  OpenAiApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: API key used by the CrewAI agents to call the LLM provider.
  CrewAiModel:
    Type: String
    Default: gpt-4o-mini
    Description: Model name used by the CrewAI agents.

Resources:
  CrewAiClientApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: crew-ai-api
      StageName: Prod
      Auth:
        ApiKeyRequired: true

  AgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: app/
      Handler: app.lambda_handler
      Runtime: python3.14
      Architectures:
      - x86_64
      Environment:
        Variables:
          OPENAI_API_KEY: !Ref OpenAiApiKey
          CREW_MODEL: !Ref CrewAiModel
      Events:
        Main:
          Type: Api
          Properties:
            RestApiId: !Ref CrewAiClientApi
            Path: /agent
            Method: post

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn:
      - CrewAiClientApiProdStage
    Properties:
      Name: crew-ai-api-key
      Description: API key required to call the API
      Enabled: true
      StageKeys:
        - RestApiId: !Ref CrewAiClientApi
          StageName: Prod

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn:
      - CrewAiClientApiProdStage
    Properties:
      UsagePlanName: crew-ai-usage-plan
      Description: Throttling and quota applied to callers of the API key
      ApiStages:
        - ApiId: !Ref CrewAiClientApi
          Stage: Prod
      Throttle:
        RateLimit: 10
        BurstLimit: 20
      Quota:
        Limit: 10000
        Period: MONTH

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyType: API_KEY
      KeyId: !Ref ApiKey
      UsagePlanId: !Ref UsagePlan

Outputs:
  # ServerlessRestApi is an implicit API created out of Events key under Serverless::Function
  # Find out more about other implicit resources you can reference within SAM
  # https://github.com/awslabs/serverless-application-model/blob/master/docs/internals/generated_resources.rst#api
  AgentApi:
    Description: API Gateway endpoint URL for Prod stage 
      function
    Value: !Sub "https://${CrewAiClientApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/agent/"
  AgentFunction:
    Description: Hello World Lambda Function ARN
    Value: !GetAtt AgentFunction.Arn
  AgentFunctionIamRole:
    Description: Implicit IAM Role created for Hello World function
    Value: !GetAtt AgentFunctionRole.Arn
